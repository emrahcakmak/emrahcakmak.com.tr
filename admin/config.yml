backend:
  name: github
  repo: emrahcakmak/emrahcakmak.com.tr
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "blog"
    label: "Blog Yönetimi"
    files:
      - label: "Makaleler Veritabanı"
        name: "articles"
        file: "articles.json"
        fields:
          - label: "Makale Listesi"
            name: "articles"
            widget: "list"
            fields:
              - {label: "Başlık", name: "title", widget: "string"}
              - {label: "Özet (Kısa Açıklama)", name: "summary", widget: "text", required: false}
              - {label: "Yayın Tarihi", name: "date", widget: "datetime", required: false}
              - {label: "Öne Çıkan Görsel", name: "image", widget: "image", required: false}
              - {label: "Etiketler (Virgülle ayırın)", name: "tags", widget: "string", required: false}
              - {label: "İçerik (Markdown)", name: "body", widget: "markdown", required: false}
              - {label: "Eski Dosya Yolu (Dokunmayın)", name: "file", widget: "string", required: false}
