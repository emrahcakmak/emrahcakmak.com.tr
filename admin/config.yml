backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "blog"
    label: "Blog Yönetimi"
    files:
      - label: "Makaleler Veritabanı"
        name: "articles"
        file: "articles.json" # CMS artık doğrudan bu dosyayı düzenleyecek
        fields:
          - label: "Makale Listesi"
            name: "articles"
            widget: "list"
            fields:
              - {label: "Başlık", name: "title", widget: "string"}
              - {label: "Özet (Kısa Açıklama)", name: "summary", widget: "text", required: false}
              - {label: "Yayın Tarihi", name: "date", widget: "datetime"}
              - {label: "Öne Çıkan Görsel", name: "image", widget: "image", required: false}
              - {label: "Etiketler (Virgülle ayırın, örn: Vergi, Mevzuat)", name: "tags", widget: "string", required: false}
              - {label: "İçerik", name: "body", widget: "markdown"}
